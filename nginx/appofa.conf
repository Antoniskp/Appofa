# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name appofasi.gr www.appofasi.gr;
    return 301 https://appofasi.gr$request_uri;
}

# Redirect www to non-www (HTTPS)
server {
    listen 443 ssl;
    server_name www.appofasi.gr;

    ssl_certificate     /etc/letsencrypt/live/appofasi.gr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/appofasi.gr/privkey.pem;

    return 301 https://appofasi.gr$request_uri;
}

# Main server block
server {
    listen 443 ssl;
    server_name appofasi.gr;

    ssl_certificate     /etc/letsencrypt/live/appofasi.gr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/appofasi.gr/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /root/public;

    # 502 error page
    error_page 502 /502.html;
    location = /502.html {
        root /root/public;
        internal;
    }

    # Allow logo and images to load on the 502 page
    location /images/ {
        root /root/public;
    }

    # API — Express backend (port 3000)
    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Frontend — Next.js (port 3001)
    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}